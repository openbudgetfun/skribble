name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: lint all
        run: lint:all
        shell: devenv shell -- bash -e {0}

  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: test
        run: test:all
        shell: devenv shell -- bash -e {0}

  rough-icons-regression:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      ROUGH_ICONS_MAX_NEW_UNRESOLVED: 0
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: rough icons unresolved regression gate
        run: ./scripts/check_rough_icons_ci.sh regression
        shell: devenv shell -- bash -e {0}
      - name: upload rough icons unresolved report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rough-icons-unresolved-report
          path: packages/skribble/unresolved-report.json
          if-no-files-found: ignore

  rough-icons-baseline-sync:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: run unresolved baseline sync check
        run: ./scripts/check_rough_icons_ci.sh baseline-sync
        shell: devenv shell -- bash -e {0}
      - name: upload unresolved baseline diff artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rough-icons-baseline-sync-diff
          path: rough-icons-baseline-sync.diff
          if-no-files-found: ignore

  rough-icons-generated-sync:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      ROUGH_ICONS_MAX_NEW_UNRESOLVED: 0
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: run rough icon catalog sync check
        run: ./scripts/check_rough_icons_ci.sh generated-sync
        shell: devenv shell -- bash -e {0}
      - name: upload rough icon catalog diff artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rough-icons-generated-sync-diff
          path: rough-icons-generated-sync.diff
          if-no-files-found: ignore

  coverage:
    if: github.ref == 'refs/heads/main'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: coverage
        run: test:coverage
        shell: devenv shell -- bash -e {0}
      - name: upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
