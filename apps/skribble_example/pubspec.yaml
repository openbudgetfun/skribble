name: skribble_example
description: >
  A hand-drawn notes app demonstrating the Skribble design system.
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3
  skribble:
    path: ../../packages/skribble

dev_dependencies:
  flutter_test:
    sdk: flutter
  skribble_lints:
    path: ../../packages/skribble_lints

flutter:
  uses-material-design: true
