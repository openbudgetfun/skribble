name: skribble_storybook
description: >
  Interactive showcase app for the Skribble hand-drawn UI component library.
  Demonstrates all 80+ widgets across component category pages and a rough-icons gallery.
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3
  skribble:
    path: ../../packages/skribble
  skribble_emoji:
    path: ../../packages/skribble_emoji
  skribble_icons:
    path: ../../packages/skribble_icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: ^4.3.0
  patrol_finders: ^3.1.0
  skribble_lints:
    path: ../../packages/skribble_lints

flutter:
  uses-material-design: true
