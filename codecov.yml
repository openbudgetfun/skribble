codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "apps/**"
  - "packages/skribble_lints/**"
  - "packages/skribble/test/**"
  - "packages/skribble/example/**"
  - "**/*.g.dart"
  - "**/*.freezed.dart"
