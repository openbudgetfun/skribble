# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  pre-commit-hooks:
    follows: git-hooks
# If you're using non-OSS software, you can set allowUnfree to true.
allowUnfree: true
