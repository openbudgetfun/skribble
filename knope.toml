[github]
owner = "openbudgetfun"
repo = "skribble"

[changes]
ignore_conventional_commits = true

###############################################################################
# Packages
###############################################################################

[packages.skribble]
versioned_files = ["packages/skribble/pubspec.yaml"]
scopes = ["skribble"]
changelog = "packages/skribble/CHANGELOG.md"
extra_changelog_sections = [
  { name = "Notes", types = ["note"] },
  { name = "Documentation", types = ["docs"] },
]

[packages.skribble_rough]
versioned_files = ["packages/skribble_rough/pubspec.yaml"]
scopes = ["skribble_rough"]
changelog = "packages/skribble_rough/CHANGELOG.md"
extra_changelog_sections = [
  { name = "Notes", types = ["note"] },
  { name = "Documentation", types = ["docs"] },
]

[packages.skribble_lints]
versioned_files = ["packages/skribble_lints/pubspec.yaml"]
scopes = ["skribble_lints"]
changelog = "packages/skribble_lints/CHANGELOG.md"
extra_changelog_sections = [
  { name = "Notes", types = ["note"] },
  { name = "Documentation", types = ["docs"] },
]

# Workflows

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows.steps]]
type = "Command"
command = "dprint fmt --config dprint.json"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "dprint fmt --config dprint.json"

[[workflows.steps]]
type = "Command"
command = "git add --all"

[[workflows.steps]]
type = "Command"
command = "git commit -m 'chore: prepare release'"

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "forced-release"

[[workflows.steps]]
type = "Release"
