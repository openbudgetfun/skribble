include: package:skribble_lints/analysis_options.yaml

# Relax rules for ported rough drawing library code
linter:
  rules:
    # Ported code uses relative imports extensively
    always_use_package_imports: false
    # Rough library uses specific type annotations for clarity
    omit_local_variable_types: false
    # Rough library has constructors after fields for readability
    sort_constructors_first: false
    # Drawing library uses mutable state with equals/hashCode
    avoid_equals_and_hash_code_on_mutable_classes: false
    # Static factory methods are idiomatic in this library
    prefer_constructors_over_static_methods: false
    # Drawing code uses double literals for coordinates
    prefer_int_literals: false
    # Canvas code uses positional booleans for brevity
    avoid_positional_boolean_parameters: false
    # Callback signatures use dynamic for flexibility
    avoid_catches_without_on_clauses: false
    # Required parameters ordering differs in ported code
    always_put_required_named_parameters_first: false
    # Library directive needed for barrel exports
    unnecessary_library_directive: false
    # Widget build methods have complex return types
    prefer_const_constructors: false
    # Cascade invocations sometimes read worse
    cascade_invocations: false
    # Ported code has specific return type conventions
    always_declare_return_types: false
    # One-member abstract classes are intentional for the painter pattern
    one_member_abstracts: false
    # Redundant argument values kept for readability in ported code
    avoid_redundant_argument_values: false
    # Ported library uses assert for null checks
    tighten_type_of_initializing_formals: false
    prefer_asserts_with_message: false
    # Ported code uses modulo for odd checks
    use_is_even_rather_than_modulo: false
    # Ignore directives from original code
    document_ignores: false

analyzer:
  errors:
    # Deprecated Radio API usage until migration to RadioGroup
    deprecated_member_use: ignore
