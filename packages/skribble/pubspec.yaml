name: skribble
description: >
  Hand-drawn UI components for Flutter. 80+ sketchy widgets with
  familiar Material and Cupertino APIs — buttons, inputs, navigation,
  dialogs, and more, all with a hand-drawn aesthetic.
version: 0.3.4
homepage: https://github.com/openbudgetfun/skribble
repository: https://github.com/openbudgetfun/skribble
documentation: https://github.com/openbudgetfun/skribble/blob/main/packages/skribble/README.md
issue_tracker: https://github.com/openbudgetfun/skribble/issues

topics:
  - ui
  - widgets
  - hand-drawn
  - design-system
  - sketch

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3
  path_parsing: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  skribble_lints:
    path: ../skribble_lints
  xml: ^6.6.1

flutter:
  uses-material-design: true
  fonts:
    - family: ArchitectsDaughter
      fonts:
        - asset: assets/fonts/ArchitectsDaughter-Regular.ttf
  assets:
    - assets/fonts/
