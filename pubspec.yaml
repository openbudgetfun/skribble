name: skribble_workspace
publish_to: none

environment:
  sdk: ^3.11.0

workspace:
  - packages/skribble
  - packages/skribble_lints
  - apps/skribble_storybook

dev_dependencies:
  melos: ^7.4.0

melos:
  name: skribble
  sdkPath: .fvm/flutter_sdk

  scripts:
    analyze:
      description: Run dart analyze across all packages.
      exec: dart analyze --fatal-infos .

    test:
      description: Run tests in all packages.
      exec: dart test
      packageFilters:
        dirExists: test
        noDependsOn: flutter

    flutter-test:
      description: Run tests in Flutter packages.
      exec: flutter test
      packageFilters:
        dirExists: test
        dependsOn: flutter

    format:
      description: Format all Dart code.
      run: dart format .

    upgrade:
      description: Upgrade dependencies in all packages.
      exec: dart pub upgrade

    screenshot:
      description: Capture component screenshots via integration tests.
      run: cd apps/skribble_storybook && flutter test integration_test/screenshots_test.dart

    rough-icons:
      description: Generate rough Material icon artifacts (Dart map + rough SVG files).
      run: >-
        cd packages/skribble &&
        dart run tool/generate_material_rough_icons.dart
        --kit flutter-material
        --rough-output-dir tool/icon_exports/rough-svg

    rough-icons-font:
      description: Generate rough Material icon font artifacts (TTF) from rough SVGs.
      run: >-
        cd packages/skribble &&
        dart run tool/generate_material_rough_icons.dart
        --kit flutter-material
        --rough-output-dir tool/icon_exports/rough-svg
        --font-output-dir tool/icon_exports/font
