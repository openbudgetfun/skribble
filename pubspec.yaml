name: skribble_workspace
publish_to: none

environment:
  sdk: ^3.11.0

workspace:
  - packages/skribble
  - packages/skribble_icons
  - packages/skribble_icons_custom
  - packages/skribble_lints
  - apps/skribble_storybook

dev_dependencies:
  melos: ^7.4.0

melos:
  name: skribble
  sdkPath: .fvm/flutter_sdk

  scripts:
    analyze:
      description: Run dart analyze across all packages.
      exec: dart analyze --fatal-infos .

    test:
      description: Run tests in all packages.
      exec: dart test
      packageFilters:
        dirExists: test
        noDependsOn: flutter

    flutter-test:
      description: Run tests in Flutter packages.
      exec: flutter test
      packageFilters:
        dirExists: test
        dependsOn: flutter

    format:
      description: Format all Dart code.
      run: dart format .

    upgrade:
      description: Upgrade dependencies in all packages.
      exec: dart pub upgrade

    screenshot:
      description: Capture component screenshots via integration tests.
      run: cd apps/skribble_storybook && flutter test integration_test/screenshots_test.dart

    rough-icons:
      description: Generate rough Material icon artifacts (Dart map + rough SVG files), applying supplemental sources and failing on unresolved regressions.
      run: >-
        cd packages/skribble &&
        dart run tool/generate_rough_icons.dart
        --kit flutter-material
        --rough-output-dir tool/icon_exports/rough-svg
        --supplemental-manifest tool/examples/material_rough_icons.supplemental.manifest.json
        --unresolved-baseline tool/examples/material_rough_icons.unresolved-baseline.json
        --max-new-unresolved 0

    rough-icons-font:
      description: Generate rough Material icon font artifacts (TTF + Dart helpers), applying supplemental sources and failing on unresolved regressions.
      run: >-
        cd packages/skribble &&
        dart run tool/generate_rough_icons.dart
        --kit flutter-material
        --rough-output-dir tool/icon_exports/rough-svg
        --font-output-dir tool/icon_exports/font
        --font-dart-output lib/src/generated/material_rough_icon_font.g.dart
        --supplemental-manifest tool/examples/material_rough_icons.supplemental.manifest.json
        --unresolved-baseline tool/examples/material_rough_icons.unresolved-baseline.json
        --max-new-unresolved 0

    rough-icons-baseline:
      description: Refresh normalized unresolved baseline JSON used for rough icon regression gating.
      run: >-
        cd packages/skribble &&
        dart run tool/generate_rough_icons.dart
        --kit flutter-material
        --rough-only
        --supplemental-manifest tool/examples/material_rough_icons.supplemental.manifest.json
        --unresolved-baseline-output tool/examples/material_rough_icons.unresolved-baseline.json
        --unresolved-baseline-output-format codepoints

    rough-icons-custom:
      description: Generate rough custom icon artifacts (Dart map) from the SVG manifest.
      run: >-
        cd packages/skribble &&
        dart run tool/generate_rough_icons.dart
        --kit svg-manifest
        --manifest ../skribble_icons_custom/tool/custom_icons.manifest.json
        --output ../skribble_icons_custom/lib/src/generated/custom_rough_icons.g.dart
        --map-name kCustomRoughIcons

    rough-icons-ci-check:
      description: Run the same rough icon regression/sync checks enforced by CI.
      run: ./scripts/check_rough_icons_ci.sh all
